<svg viewBox="0 0 900 720" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f13"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366f1" opacity="0.7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981" opacity="0.7"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="720" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="white" font-size="18" font-weight="700" letter-spacing="1">Multi-Agent Customer Support — Architecture</text>
  <text x="450" y="56" text-anchor="middle" fill="#6366f1" font-size="11">FastAPI · LangGraph · Groq · ChromaDB · Next.js</text>

  <!-- USER -->
  <rect x="365" y="75" width="170" height="50" rx="12" fill="url(#purpleGrad)" filter="url(#glow)" opacity="0.9"/>
  <text x="450" y="96" text-anchor="middle" fill="white" font-size="13" font-weight="600">👤 User</text>
  <text x="450" y="114" text-anchor="middle" fill="#c4b5fd" font-size="10">Browser / Mobile</text>

  <!-- Arrow: User → Frontend -->
  <line x1="450" y1="125" x2="450" y2="150" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6" marker-end="url(#arrow)"/>

  <!-- NEXT.JS FRONTEND -->
  <rect x="310" y="153" width="280" height="54" rx="12" fill="#1e1e2a" stroke="#6366f1" stroke-width="1.5" opacity="0.9"/>
  <text x="450" y="176" text-anchor="middle" fill="white" font-size="13" font-weight="600">⚛ Next.js Frontend</text>
  <text x="450" y="196" text-anchor="middle" fill="#a5b4fc" font-size="10">WebSocket Client · Reconnect Logic · UI State</text>

  <!-- Arrow: Frontend → WebSocket -->
  <line x1="450" y1="207" x2="450" y2="232" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6" marker-end="url(#arrow)"/>
  <text x="470" y="223" fill="#818cf8" font-size="9">ws://</text>

  <!-- FASTAPI -->
  <rect x="310" y="235" width="280" height="54" rx="12" fill="#1e1e2a" stroke="#4f46e5" stroke-width="1.5" opacity="0.9"/>
  <text x="450" y="258" text-anchor="middle" fill="white" font-size="13" font-weight="600">⚡ FastAPI Backend</text>
  <text x="450" y="278" text-anchor="middle" fill="#a5b4fc" font-size="10">WebSocket Handler · CORS · Health Endpoint</text>

  <!-- Arrow: FastAPI → LangGraph -->
  <line x1="450" y1="289" x2="450" y2="314" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6" marker-end="url(#arrow)"/>

  <!-- LANGGRAPH BOX -->
  <rect x="180" y="317" width="540" height="230" rx="14" fill="#12121a" stroke="#7c3aed" stroke-width="1.5" opacity="0.9"/>
  <text x="450" y="340" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700">🔀 LangGraph Orchestrator</text>
  <text x="450" y="356" text-anchor="middle" fill="#6d5a9e" font-size="9">StateGraph · MemorySaver Checkpoints · Conditional Routing</text>

  <!-- Supervisor Node -->
  <rect x="330" y="365" width="240" height="42" rx="9" fill="url(#purpleGrad)" opacity="0.85"/>
  <text x="450" y="382" text-anchor="middle" fill="white" font-size="11" font-weight="600">🎯 Supervisor Node</text>
  <text x="450" y="398" text-anchor="middle" fill="#ddd6fe" font-size="9">Intent Classification · Sentiment · Action Dispatch</text>

  <!-- Arrows from supervisor to agents -->
  <line x1="380" y1="407" x2="280" y2="430" stroke="#6366f1" stroke-width="1.2" opacity="0.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="407" x2="450" y2="430" stroke="#6366f1" stroke-width="1.2" opacity="0.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="407" x2="620" y2="430" stroke="#6366f1" stroke-width="1.2" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- KB Agent -->
  <rect x="205" y="430" width="145" height="40" rx="8" fill="#1a2744" stroke="#2563eb" stroke-width="1.2"/>
  <text x="277" y="447" text-anchor="middle" fill="white" font-size="10" font-weight="600">📚 KB Agent</text>
  <text x="277" y="461" text-anchor="middle" fill="#93c5fd" font-size="8">ChromaDB · RAG Retrieval</text>

  <!-- Responder Node -->
  <rect x="370" y="430" width="160" height="40" rx="8" fill="#1a2744" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="450" y="447" text-anchor="middle" fill="white" font-size="10" font-weight="600">💬 Responder Node</text>
  <text x="450" y="461" text-anchor="middle" fill="#c4b5fd" font-size="8">Groq Synthesis · Multi-turn</text>

  <!-- Action Agent -->
  <rect x="550" y="430" width="145" height="40" rx="8" fill="#1a2744" stroke="#d97706" stroke-width="1.2"/>
  <text x="622" y="447" text-anchor="middle" fill="white" font-size="10" font-weight="600">⚙ Action Agent</text>
  <text x="622" y="461" text-anchor="middle" fill="#fcd34d" font-size="8">Refund · Tracking · Return</text>

  <!-- Arrows to Responder -->
  <line x1="277" y1="470" x2="380" y2="490" stroke="#6366f1" stroke-width="1.2" opacity="0.5" marker-end="url(#arrow)"/>
  <line x1="622" y1="470" x2="530" y2="490" stroke="#6366f1" stroke-width="1.2" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Escalation label -->
  <rect x="210" y="495" width="120" height="30" rx="7" fill="#3b1212" stroke="#ef4444" stroke-width="1"/>
  <text x="270" y="508" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="600">🚨 Escalation Path</text>
  <text x="270" y="520" text-anchor="middle" fill="#f87171" font-size="8">Human Agent Hand-off</text>

  <!-- Learning Agent -->
  <rect x="565" y="495" width="130" height="30" rx="7" fill="#12261e" stroke="#10b981" stroke-width="1"/>
  <text x="630" y="508" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="600">📝 Learning Agent</text>
  <text x="630" y="520" text-anchor="middle" fill="#34d399" font-size="8">Resolution Logger</text>

  <!-- END node -->
  <line x1="450" y1="530" x2="450" y2="550" stroke="#7c3aed" stroke-width="1.2" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Arrow out of LangGraph -->
  <line x1="450" y1="547" x2="450" y2="572" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6" marker-end="url(#arrow)"/>

  <!-- External Services Row -->
  <!-- GROQ -->
  <rect x="100" y="575" width="180" height="56" rx="10" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="190" y="598" text-anchor="middle" fill="white" font-size="12" font-weight="600">⚡ Groq API</text>
  <text x="190" y="614" text-anchor="middle" fill="#fcd34d" font-size="9">Llama 3.3-70B</text>
  <text x="190" y="626" text-anchor="middle" fill="#a3a3a3" font-size="8">Intent · Sentiment · Response</text>

  <!-- CHROMADB -->
  <rect x="360" y="575" width="180" height="56" rx="10" fill="#1a1a2e" stroke="#10b981" stroke-width="1.5"/>
  <text x="450" y="598" text-anchor="middle" fill="white" font-size="12" font-weight="600">🗄 ChromaDB</text>
  <text x="450" y="614" text-anchor="middle" fill="#6ee7b7" font-size="9">Persistent Vector Store</text>
  <text x="450" y="626" text-anchor="middle" fill="#a3a3a3" font-size="8">MiniLM-L6-v2 Embeddings</text>

  <!-- HUMAN ESCALATION -->
  <rect x="620" y="575" width="180" height="56" rx="10" fill="#1a1a2e" stroke="#ef4444" stroke-width="1.5"/>
  <text x="710" y="598" text-anchor="middle" fill="white" font-size="12" font-weight="600">👨‍💼 Human Agent</text>
  <text x="710" y="614" text-anchor="middle" fill="#fca5a5" font-size="9">Escalation Queue</text>
  <text x="710" y="626" text-anchor="middle" fill="#a3a3a3" font-size="8">Negative Sentiment Trigger</text>

  <!-- Connection lines to external services -->
  <line x1="340" y1="490" x2="190" y2="575" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,3" opacity="0.5" marker-end="url(#arrowOrange)"/>
  <line x1="277" y1="470" x2="400" y2="575" stroke="#10b981" stroke-width="1" stroke-dasharray="3,3" opacity="0.5" marker-end="url(#arrowGreen)"/>
  <line x1="270" y1="525" x2="660" y2="575" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Legend -->
  <text x="20" y="685" fill="#6b7280" font-size="9">─ ─  WebSocket / async call</text>
  <text x="170" y="685" fill="#6366f1" font-size="9">──  Graph edge</text>
  <text x="260" y="685" fill="#10b981" font-size="9">──  ChromaDB query</text>
  <text x="370" y="685" fill="#f59e0b" font-size="9">──  Groq API call</text>
  <text x="460" y="685" fill="#ef4444" font-size="9">──  Escalation path</text>
</svg>
