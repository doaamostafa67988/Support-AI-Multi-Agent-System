name: Sync Backend to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - 'backend/**' # Only triggers when files inside the backend folder change

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push backend subtree to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure Git credentials using your secure token
          git config --global user.email "bot@github.com"
          git config --global user.name "GitHub Action Bot"
          
          # Add the Hugging Face Space repository as a remote origin
          git remote add hf https://Doaamostafa:$HF_TOKEN@huggingface.co/spaces/Doaamostafa/support-ai-backend
          
          # Force push only the contents of the 'backend' subdirectory directly into Hugging Face main branch
          git subtree push --prefix backend hf main --force