name: Sync Backend to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Push backend directory to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Configure Git Identity inside the runner environment
          git config --global user.email "bot@github.com"
          git config --global user.name "doaamostafa"
          
          # 2. Clone the Hugging Face Space repository into a temporary folder
          git clone https://doaamostafa:$HF_TOKEN@huggingface.co/spaces/doaamostafa/support-ai-backend hf_space
          
          # 3. Clean existing old files in the Space to prevent conflicts (except the .git folder)
          find hf_space -maxdepth 1 ! -name 'hf_space' ! -name '.git' -exec rm -rf {} +
          
          # 4. Copy fresh contents of your local backend directory directly into the space folder
          cp -r backend/* hf_space/
          
          # 5. Commit and push the changes directly to Hugging Face main branch
          cd hf_space
          git add .
          git diff-index --quiet HEAD || git commit -m "Automated backend update from GitHub Actions"
          git push origin main