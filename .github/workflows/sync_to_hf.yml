name: Sync Backend to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync Backend to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Install standard deployment tools
          sudo apt-get update && sudo apt-get install -y git-filter-repo

          # 2. Isolate ONLY the backend folder content to be the root of the upload
          git filter-repo --path backend

          # 3. Move files out of the 'backend' subfolder to the root level for Docker to read properly
          mv backend/* . 2>/dev/null || true
          rm -rf backend

          # 4. Configure authentication using lowercase username matching your Space URL
          git config --global user.email "bot@github.com"
          git config --global user.name "doaamostafa"

          # 5. Force push the clean, isolated backend straight into Hugging Face
          git remote add hf https://doaamostafa:$HF_TOKEN@huggingface.co/spaces/doaamostafa/support-ai-backend
          git push hf main --force